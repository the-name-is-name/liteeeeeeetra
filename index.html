<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicVault KSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="min-h-screen" x-data="comicApp()" x-init="init()">

    <!-- NAVBAR -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-xl border-b border-slate-800">
        <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
            COMIC VAULT KSA
        </h1>
        <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-800">
            <button @click="switchUser('Me')" :class="currentUser === 'Me' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'" class="px-5 py-1.5 rounded-md text-sm font-bold transition-all">My Vault</button>
            <button @click="switchUser('Friend')" :class="currentUser === 'Friend' ? 'bg-cyan-600 text-white shadow-lg' : 'text-slate-400'" class="px-5 py-1.5 rounded-md text-sm font-bold transition-all">Friend's Vault</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- SEARCH SECTION -->
        <section class="mb-12">
            <div class="flex gap-3 mb-8">
                <input type="text" x-model="searchQuery" @keyup.enter="searchComics()" placeholder="Search rcostation database..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-5 py-3.5 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <button @click="searchComics()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-3.5 rounded-xl neon-glow active:scale-95 transition-all">Search</button>
            </div>

            <div x-show="searchResults.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <template x-for="comic in searchResults" :key="comic.link">
                    <div class="glass rounded-xl overflow-hidden group hover:scale-[1.02] transition-all duration-300">
                        <img :src="comic.poster" class="w-full h-64 object-cover" alt="">
                        <div class="p-3">
                            <h3 class="font-bold text-sm truncate mb-2" x-text="comic.title"></h3>
                            
                            <!-- KSA Price Check Button -->
                            <button @click="checkKsaPrices(comic.title)" class="w-full bg-amber-600/80 hover:bg-amber-500 text-[10px] py-1.5 rounded-lg font-bold mb-2 uppercase tracking-wider">
                                Check KSA Prices
                            </button>
                            <div x-show="loadingPrices === comic.title" class="text-[10px] text-amber-400 text-center mb-2">Scanning Haraj/Amazon...</div>
                            <div x-show="ksaPrices[comic.title]" class="bg-slate-800 p-2 rounded text-[10px] mb-2 space-y-1">
                                <p class="text-green-400">Amazon: <span x-text="ksaPrices[comic.title]?.amazon"></span></p>
                                <p class="text-blue-400">Haraj: <span x-text="ksaPrices[comic.title]?.haraj"></span></p>
                            </div>

                            <div class="flex gap-2">
                                <button @click="openReader(comic.link)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-xs py-2 rounded-lg font-semibold">Preview</button>
                                <button @click="promptAdd(comic)" class="flex-1 bg-indigo-600/80 hover:bg-indigo-500 text-xs py-2 rounded-lg font-semibold">+ Vault</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- RECOMMENDATIONS -->
        <section x-show="recommendations.length > 0" class="mb-12 bg-gradient-to-r from-indigo-900/20 to-cyan-900/20 border border-slate-800 rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">💡 Recommendations (Owned by Friend, not you)</h2>
            <div class="flex gap-4 overflow-x-auto pb-2">
                <template x-for="rec in recommendations" :key="rec.id">
                    <div class="flex-shrink-0 w-32 glass rounded-lg p-2 border border-slate-700">
                        <img :src="rec.image_url" class="w-full h-40 object-cover rounded mb-2">
                        <p class="text-xs font-bold truncate" x-text="rec.title"></p>
                    </div>
                </template>
            </div>
        </section>

        <!-- COLLECTION SECTION -->
        <section>
            <h2 class="text-3xl font-black mb-6 border-b border-slate-800 pb-3">
                <span x-text="currentUser === 'Me' ? 'My' : 'Friend\'s'"></span> Collection
                <span class="text-slate-500 text-lg font-normal" x-text="`(${collection.length})`"></span>
            </h2>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <template x-for="item in collection" :key="item.id">
                    <div class="glass rounded-xl overflow-hidden relative group">
                        <img :src="item.image_url" class="w-full h-72 object-cover" alt="">
                        <div class="absolute inset-0 bg-slate-900/90 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-center items-center p-4 gap-3">
                            <button @click="openReader(item.comic_url)" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-bold">Read Now</button>
                            <button @click="removeFromCollection(item.id)" class="w-full bg-red-600/80 text-white py-2 rounded-lg text-xs font-semibold">Remove</button>
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold text-sm truncate" x-text="item.title"></h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-xs text-green-400 font-mono font-bold" x-text="item.price"></span>
                                <span class="text-[10px] text-slate-300 bg-slate-800 px-2 py-1 rounded-full" x-text="item.store"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <!-- READER MODAL (Uses your proxy) -->
    <div x-show="readerOpen" x-cloak class="fixed inset-0 bg-black/98 z-[100] flex flex-col items-center overflow-y-auto">
        <div class="w-full max-w-4xl flex justify-between items-center mb-4 sticky top-0 bg-black/90 p-4 border-b border-slate-800 z-10">
            <h2 class="text-xl font-bold text-white">Reading Mode</h2>
            <button @click="readerOpen = false" class="bg-red-600 text-white px-5 py-2 rounded-lg font-bold text-sm">Close</button>
        </div>
        <div class="flex flex-col gap-2 w-full max-w-3xl px-4 pb-10">
            <template x-for="page in readerPages" :key="page">
                <img :src="page" class="w-full rounded-lg shadow-2xl bg-slate-900" alt="Comic Page">
            </template>
        </div>
    </div>

    <!-- ADD TO VAULT MODAL -->
    <div x-show="showAddModal" x-cloak class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Add to Vault</h3>
            <p class="mb-5 text-slate-400 text-sm truncate" x-text="selectedComic?.title"></p>
            
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Store (Where did you get it?)</label>
            <select x-model="newItemStore" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg mb-4 text-white outline-none">
                <option value="Haraj">Haraj</option>
                <option value="Amazon.sa">Amazon.sa</option>
                <option value="Jarir">Jarir Bookstore</option>
                <option value="Virgin">Virgin Megastore</option>
                <option value="eBay">eBay</option>
            </select>

            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Price Paid</label>
            <input type="text" x-model="newItemPrice" placeholder="e.g. 45 SAR" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg mb-6 text-white outline-none">
            
            <div class="flex gap-3">
                <button @click="confirmAdd()" class="flex-1 bg-indigo-600 p-3 rounded-lg font-bold">Save</button>
                <button @click="showAddModal = false" class="flex-1 bg-slate-800 p-3 rounded-lg font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <footer class="text-center py-10 text-gray-600 text-sm border-t border-slate-800 mt-20">
        Made by me xD | Private Comic Tracker for KSA
    </footer>

    <script>
        // 🔒 NO KEYS HERE! Only your Render Backend URL.
        const API_URL = 'https://YOUR-RENDER-APP-NAME.onrender.com'; 

        function comicApp() {
            return {
                currentUser: 'Me',
                searchQuery: '',
                searchResults: [],
                collection: [],
                allCollections: { Me: [], Friend: [] },
                readerOpen: false,
                readerPages: [],
                showAddModal: false,
                selectedComic: null,
                newItemStore: 'Haraj',
                newItemPrice: '',
                ksaPrices: {},
                loadingPrices: null,
                recommendations: [],

                async init() { await this.fetchAllCollections(); },
                switchUser(user) {
                    this.currentUser = user;
                    this.collection = this.allCollections[user] || [];
                    this.calculateRecommendations();
                },

                async fetchAllCollections() {
                    const meRes = await fetch(`${API_URL}/api/collection?owner=Me`);
                    const friendRes = await fetch(`${API_URL}/api/collection?owner=Friend`);
                    this.allCollections.Me = await meRes.json();
                    this.allCollections.Friend = await friendRes.json();
                    this.collection = this.allCollections[this.currentUser];
                    this.calculateRecommendations();
                },

                calculateRecommendations() {
                    if (this.currentUser === 'Me') {
                        const myTitles = this.allCollections.Me.map(c => c.title.toLowerCase());
                        this.recommendations = this.allCollections.Friend.filter(c => !myTitles.includes(c.title.toLowerCase())).slice(0, 5);
                    } else {
                        const friendTitles = this.allCollections.Friend.map(c => c.title.toLowerCase());
                        this.recommendations = this.allCollections.Me.filter(c => !friendTitles.includes(c.title.toLowerCase())).slice(0, 5);
                    }
                },

                async searchComics() {
                    if (!this.searchQuery) return;
                    const res = await fetch(`${API_URL}/api/search?q=${encodeURIComponent(this.searchQuery)}`);
                    this.searchResults = await res.json();
                },

                async checkKsaPrices(title) {
                    this.loadingPrices = title;
                    try {
                        const res = await fetch(`${API_URL}/api/ksa-prices?q=${encodeURIComponent(title)}`);
                        const data = await res.json();
                        this.ksaPrices[title] = data;
                    } catch (e) { console.error(e); }
                    this.loadingPrices = null;
                },

                promptAdd(comic) {
                    this.selectedComic = comic;
                    this.newItemStore = 'Haraj';
                    this.newItemPrice = '';
                    this.showAddModal = true;
                },

                async confirmAdd() {
                    if (!this.newItemPrice) return alert('Enter price.');
                    await fetch(`${API_URL}/api/collection`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: this.selectedComic.title,
                            image_url: this.selectedComic.poster,
                            comic_url: this.selectedComic.link,
                            owner: this.currentUser,
                            price: this.newItemPrice,
                            store: this.newItemStore
                        })
                    });
                    this.showAddModal = false;
                    await this.fetchAllCollections();
                },

                async removeFromCollection(id) {
                    if(confirm('Remove?')) {
                        await fetch(`${API_URL}/api/collection/${id}`, { method: 'DELETE' });
                        await this.fetchAllCollections();
                    }
                },

                async openReader(comicUrl) {
                    this.readerOpen = true;
                    this.readerPages = [];
                    const chapRes = await fetch(`${API_URL}/api/chapters?url=${encodeURIComponent(comicUrl)}`);
                    const chapters = await chapRes.json();
                    if (chapters.length === 0) return alert('No chapters');
                    
                    const pageRes = await fetch(`${API_URL}/api/pages?url=${encodeURIComponent(chapters[0].link)}`);
                    this.readerPages = await pageRes.json();
                }
            }
        }
    </script>
</body>
</html>
